<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Моя сделка - Степпер</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="stepper-container">
    <div class="stepper-wrapper">
      <div class="step active">
        <div class="step-circle">1</div>
        <div class="step-label">Заявка</div>
      </div>
      <div class="line active"></div> 
      
      <div class="step">
        <div class="step-circle">2</div>
        <div class="step-label">Объект</div>
      </div>
      <div class="line"></div> 
      
      <div class="step">
        <div class="step-circle">3</div>
        <div class="step-label">Сделка</div>
      </div>
    </div>
  </div>

  <button class="btn-next" onclick="nextStep()">Следующий этап</button>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
  const tg = window.Telegram.WebApp;
  tg.expand(); // Развернуть окно на максимум

  const userId = tg.initDataUnsafe.user.id; // Получаем ID пользователя из ТГ
  const scriptUrl = "https://script.google.com/macros/s/AKfycbxd427Lf_MvkgW2wDdP921g6hytu18oxG7_AMxk7krmVSOGI-uOCqp9YOc-SjjDFEdnzw/exec"; // Вставьте сюда ссылку от Google Script
  
  // Функция, которая идет в таблицу за данными
  async function loadProgress() {
    try {
      const response = await fetch(`${scriptUrl}?userId=${userId}`);
      const currentStage = await response.text();
      updateUI(parseInt(currentStage));
    } catch (e) {
      console.error("Ошибка загрузки данных", e);
    }
  }

  function updateUI(stage) {
    const steps = document.querySelectorAll('.step');
    const lines = document.querySelectorAll('.line');

    steps.forEach((step, index) => {
      if (index < stage) {
        step.classList.add('active');
        if (lines[index - 1]) lines[index - 1].classList.add('active');
      }
    });
  }

  loadProgress(); // Запускаем при открытии
</script>


</body>
</html>
